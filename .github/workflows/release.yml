name: Release

on:
  push:
    tags:
      - 'v*'

env:
  SCALA_VERSION: 3.8.4

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'sbt'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Run cross-compiled tests
        run: sbt +test

      - name: Run sbt 1.x scripted tests
        run: sbt "scripted sbt-config/simple"

      - name: Run sbt 2.x scripted tests
        run: sbt "++$SCALA_VERSION; scripted sbt-config-sbt2/simple-sbt2"

      - name: Publish to Sonatype Central
        run: sbt ci-release
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
