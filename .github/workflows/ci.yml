name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SCALA_VERSION: 3.8.4

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'sbt'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Run unit tests with coverage
        run: sbt coverage test coverageReport

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/scala-2.12/scoverage-report/scoverage.xml

      - name: Run cross-compiled unit tests
        run: sbt +test

      - name: Run sbt 1.x scripted tests
        run: sbt "scripted sbt-config/*"

      - name: Run sbt 2.x scripted tests
        run: sbt "++$SCALA_VERSION; scripted sbt-config-sbt2/*"

  scalafmt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'sbt'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Check formatting
        run: sbt scalafmtCheckAll

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'sbt'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Check documentation compiles
        run: sbt "++$SCALA_VERSION; doc"
